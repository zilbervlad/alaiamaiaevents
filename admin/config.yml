backend:
  name: git-gateway
  branch: main

media_folder: "images/gallery"
public_folder: "/images/gallery"
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery_data"
        label: "Gallery Photos"
        file: "gallery-data.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            collapsed: true
            summary: "{{fields.alt}}"
            fields:
              - label: "Image"
                name: "src"
                widget: "image"
                choose_url: false
                media_folder: "images/gallery"
                public_folder: "/images/gallery"
              - label: "Alt Text"
                name: "alt"
                widget: "string"
                hint: "Describe the photo for accessibility and Google."
              - label: "Caption"
                name: "caption"
                widget: "string"
                required: false
              - label: "Show on Homepage"
                name: "featured"
                widget: "boolean"
                required: false
                default: false
